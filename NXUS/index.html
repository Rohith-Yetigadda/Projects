<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>NXUS | Habit Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
  </head>
  <body>
    <div class="app">
      <div class="menu-overlay" id="menuOverlay"></div>
      <div class="side-menu" id="sideMenu">

        <div class="menu-header">
          <div class="menu-profile">
            <div class="menu-avatar" id="menuAvatar">N</div>
            <div class="menu-profile-info">
              <div class="menu-name-row">
                <span class="menu-display-name" id="menuDisplayName">User</span>
                <button class="menu-edit-name-btn" id="editNameBtn" title="Edit name">
                  <i data-lucide="pencil" style="width:13px;height:13px;"></i>
                </button>
              </div>
              <span class="menu-email" id="menuEmail">—</span>
            </div>
          </div>
          <input class="menu-name-input" id="menuNameInput" type="text" placeholder="Your name" style="display:none;" />
        </div>

        <div class="menu-section">
          <div class="menu-section-label">Appearance</div>

          <div class="menu-row" id="themeToggleRow">
            <div class="menu-row-left">
              <i data-lucide="sun" style="width:15px;height:15px;"></i>
              <span>Light Mode</span>
            </div>
            <div class="menu-toggle" id="themeToggle">
              <div class="menu-toggle-thumb"></div>
            </div>
          </div>

          <div class="menu-row">
            <div class="menu-row-left">
              <i data-lucide="layers" style="width:15px;height:15px;"></i>
              <span>Compact View</span>
            </div>
            <div class="menu-toggle" id="densityToggle">
              <div class="menu-toggle-thumb"></div>
            </div>
          </div>

          <div class="menu-row-label">Accent Color</div>
          <div class="palette-grid" id="paletteGrid">
            <div class="palette-dot active" data-palette="emerald" style="background:#63e6a4;" title="Emerald"></div>
            <div class="palette-dot" data-palette="cyan" style="background:#4fd1ff;" title="Ocean"></div>
            <div class="palette-dot" data-palette="violet" style="background:#a78bfa;" title="Violet"></div>
            <div class="palette-dot" data-palette="sunset" style="background:#fb923c;" title="Sunset"></div>
            <div class="palette-dot" data-palette="rose" style="background:#fb7185;" title="Rose"></div>
          </div>
        </div>

        <div class="menu-section">
          <div class="menu-section-label">Data</div>
          <div class="menu-row" id="exportBtn">
            <div class="menu-row-left">
              <i data-lucide="download" style="width:15px;height:15px;"></i>
              <span>Export Month CSV</span>
            </div>
            <i data-lucide="chevron-right" style="width:14px;height:14px;opacity:0.4;"></i>
          </div>

          <div class="menu-row" id="syncBtn">
          <div class="menu-row-left">
            <i data-lucide="refresh-cw" style="width:16px;height:16px;"></i>
            <div style="display:flex;flex-direction:column;gap:2px;">
              <span>Sync from Last Month</span>
            </div>
          </div>
          <i data-lucide="chevron-right" style="width:14px;height:14px;opacity:0.4;flex-shrink:0;"></i>
        </div>
        </div>

        <div class="menu-footer">
          <div class="menu-app-info">
            <div class="menu-app-version">version 1.1</div>
          </div>
          <div class="menu-row menu-signout" id="menuSignOut">
            <div class="menu-row-left">
              <i data-lucide="log-out" style="width:15px;height:15px;"></i>
              <span>Sign Out</span>
            </div>
          </div>
        </div>

      </div>

      <header class="top">
        <div class="top-left">
        <button class="hamburger-btn" id="hamburgerBtn">
          <span></span><span></span><span></span>
        </button>
        <div class="date-picker">
          <input type="number" id="year" placeholder="YYYY" />
          <div class="dropdown" id="monthDropdown"></div>
        </div>
      </div>

      <div class="top-logo">NXUS</div>

      <div class="headline">
        <div class="headline-label">
          <i data-lucide="trending-up" class="headline-icon"></i>
          <span>ON TRACK</span>
        </div>
        <h1 id="successRate" class="gradient-text">0%</h1>
        <span class="sub">monthly progress</span>
        </div>
      </header>

      <section class="today-focus">
        <div class="today-header">
          <div class="today-header-title">
            <i data-lucide="activity" style="color: var(--accent)"></i>
            <h2>Activity Graph</h2>
          </div>
          <div id="todaySummary" class="graph-summary">0 net score</div>
        </div>
        <div class="graph-container">
          <svg
            id="activityGraph"
            width="100%"
            height="100%"
            viewBox="0 0 800 150"
            preserveAspectRatio="none"
          ></svg>
        </div>
      </section>

      <section class="analytics">
        <div class="ring-block">
          <div class="ring" id="ring-efficiency">
            <svg viewBox="0 0 80 80">
              <defs>
                <linearGradient
                  id="grad-teal"
                  x1="0%"
                  y1="0%"
                  x2="100%"
                  y2="0%"
                >
                  <stop class="accent-stop-1" offset="0%" stop-color="#2dd4bf" />
                  <stop class="accent-stop-2" offset="100%" stop-color="#0d9488" />
                </linearGradient>
              </defs>
              <circle class="ring-bg" cx="40" cy="40" r="34"></circle>
              <circle
                class="ring-progress"
                cx="40"
                cy="40"
                r="34"
                stroke="url(#grad-teal)"
                id="path-efficiency"
              ></circle>
            </svg>
            <span id="efficiencyPct">0%</span>
          </div>
          <div class="ring-label">Efficiency</div>
        </div>

        <div class="ring-block">
          <div class="ring" id="ring-normalized">
            <svg viewBox="0 0 80 80">
              <defs>
                <linearGradient
                  id="grad-cyan"
                  x1="0%"
                  y1="0%"
                  x2="100%"
                  y2="0%"
                >
                  <stop offset="0%" stop-color="#3b82f6" />
                  <stop offset="100%" stop-color="#2563eb" />
                </linearGradient>
              </defs>
              <circle class="ring-bg" cx="40" cy="40" r="34"></circle>
              <circle
                class="ring-progress"
                cx="40"
                cy="40"
                r="34"
                stroke="url(#grad-cyan)"
                id="path-normalized"
              ></circle>
            </svg>
            <span id="normalizedPct">0%</span>
          </div>
          <div class="ring-label">Today</div>
        </div>

        <div class="ring-block">
          <div class="ring" id="ring-momentum">
            <svg viewBox="0 0 80 80">
              <defs>
                <linearGradient
                  id="grad-yellow"
                  x1="0%"
                  y1="0%"
                  x2="100%"
                  y2="0%"
                >
                  <stop offset="0%" stop-color="#facc15" />
                  <stop offset="100%" stop-color="#fbbf24" />
                </linearGradient>
              </defs>
              <circle class="ring-bg" cx="40" cy="40" r="34"></circle>
              <circle
                class="ring-progress"
                cx="40"
                cy="40"
                r="34"
                stroke="url(#grad-yellow)"
                id="path-momentum"
              ></circle>
            </svg>
            <span id="momentumPct">0%</span>
          </div>
          <div class="ring-label">Momentum</div>
        </div>

        <div class="streak-widget">
          <div class="streak-info">
            <div class="streak-count">
              <i data-lucide="flame" class="streak-icon"></i>
              <span id="streakValue">0</span>
            </div>
            <div class="streak-label">Current Streak</div>
          </div>

          <div id="dailyQuote" class="quote-text">Loading...</div>

          <div class="heatmap-grid" id="streakHeatmap"></div>
        </div>
      </section>

      <section class="habits">
        <div class="section-title">Monthly overview</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr id="dayHeader"></tr>
            </thead>
            <tbody id="habitBody"></tbody>
          </table>
        </div>

        <div class="footer">
          <button id="addHabit">Add habit</button>
          <div
            class="footer-right"
            style="display: flex; align-items: center; gap: 20px"
          >
            <div class="counter"></div>

          </div>
        </div>
      </section>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
